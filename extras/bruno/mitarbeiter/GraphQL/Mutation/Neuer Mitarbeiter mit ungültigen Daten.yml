info:
  name: Neuer Mitarbeiter mit ungültigen Daten
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      mutation {
        create(
          mitarbeiterInput: {
            nachname: "falscher_nachname"
            email: "falsche_email@com"
            position: INVALID
            gehalt: "4500.00"
            eintrittsdatum: "2020-02-20"
            homepage: "https://?!"
            geschlecht: BINÄR
            werksausweis: {
             status: PASSIV
             guthaben: 36.0
             ausstellungsdatum: "2023-04-24"
            }
            auftraege: [{
              bezeichnung: "Testauftrag"
              auftragserteilung: "2025-01-01"
              dauer: "2025-12-31"
            }]
            username: "testgql123"
          }
       ) {
         id
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.errors
      operator: isArray
    - expression: res.body.errors
      operator: length
      value: "1"
    - expression: res.body.errors[0].message
      operator: contains
      value: nachname
    - expression: res.body.errors[0].message
      operator: contains
      value: email
    - expression: res.body.errors[0].message
      operator: contains
      value: position
    - expression: res.body.errors[0].message
      operator: contains
      value: gehalt
    - expression: res.body.errors[0].message
      operator: contains
      value: eintrittsdatum
    - expression: res.body.errors[0].message
      operator: contains
      value: homepage
    - expression: res.body.errors[0].message
      operator: contains
      value: geschlecht
    - expression: res.body.errors[0].message
      operator: contains
      value: username
    - expression: res.body.errors[0].path
      operator: isArray
    - expression: res.body.errors[0].path
      operator: length
      value: "1"
    - expression: res.body.errors[0].path[0]
      operator: eq
      value: create

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
