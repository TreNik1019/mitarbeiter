info:
  name: Suche id, version, ... von Mitarbeitern mit der Emailadresse
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      query ($email: String = "mueller@firma.de") {
        mmitarbeiter(suchparameter: {email: $email}) {
          id
          version
          nachname
          position
          gehalt
          eintrittsdatum
          homepage
          geschlecht
          werksausweis {
            status
            guthaben
            ausstellungsdatum
          }
          username
        }
      }
    variables: |-
      {
        "email": "mueller@firma.de"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.mmitarbeiter
      operator: isArray
    - expression: res.body.data.mmitarbeiter
      operator: length
      value: "1"
    - expression: res.body.data.mmitarbeiter[0]
      operator: isJson
    - expression: res.body.data.mmitarbeiter[0].id
      operator: gte
      value: "0"
    - expression: res.body.data.mmitarbeiter[0].version
      operator: gte
      value: "0"
    - expression: res.body.data.mmitarbeiter[0].nachname
      operator: isString
    - expression: res.body.data.mmitarbeiter[0].nachname
      operator: isNotEmpty
    - expression: res.body.data.mmitarbeiter[0].position
      operator: isString
    - expression: res.body.data.mmitarbeiter[0].gehalt
      operator: gte
      value: "0"
    - expression: res.body.data.mmitarbeiter[0].eintrittsdatum
      operator: isDate
    - expression: res.body.data.mmitarbeiter[0].homepage
      operator: isString
    - expression: res.body.data.mmitarbeiter[0].geschlecht
      operator: isString
    - expression: res.body.data.mmitarbeiter[0].werksausweis
      operator: isJson
    - expression: res.body.data.mmitarbeiter[0].username
      operator: isString
    - expression: res.body.data.mmitarbeiter[0].username
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
